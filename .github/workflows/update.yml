name: Update CEC News

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run scraper
        run: |
          node scraper.js
      
      - name: Copy to public
        run: |
          cp news-data.json public/
          cp -r images public/ 2>/dev/null || true
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/news-data.json public/images/
          git commit -m "🔄 Update news - $(date '+%Y-%m-%d %H:%M')" || echo "No changes"
          git push