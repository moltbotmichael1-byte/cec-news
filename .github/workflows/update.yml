name: Update CEC News

on:
  schedule:
    # Cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch: # Ejecutar manualmente desde GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run scraper
        run: |
          cd ${{ github.workspace }}
          node scraper.js
      
      - name: Copy to public
        run: |
          cp news-data.json public/
          cp -r images public/ 2>/dev/null || true
      
      - name: Check for changes
        id: check
        run: |
          git diff --quiet public/news-data.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit & Push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/news-data.json public/images/
          git commit -m "🔄 Noticias actualizadas - $(date '+%Y-%m-%d %H:%M')"
          git push
      
      - name: Deploy to Cloudflare
        if: steps.check.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          cd public
          wrangler pages deploy . --project-name=cec-news