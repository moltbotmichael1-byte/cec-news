<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CEC News - Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -webkit-overflow-scrolling: touch;
            overflow-x: hidden;
        }

        body {
            min-height: 100vh;
            overflow-y: auto;
        }

        .widget-container {
            max-width: 100%;
            width: 100%;
            margin: 0 auto;
            background: #fff;
        }

        /* Header */
        .widget-header {
            background: #fff;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            border-bottom: 1px solid #e2e8f0;
        }

        .widget-banner {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            text-decoration: none;
        }

        .widget-logo {
            height: 36px;
            width: auto;
            flex-shrink: 0;
        }

        .widget-title-group {
            margin-left: 10px;
        }

        .widget-subtitle {
            color: #718096;
            font-size: 10px;
            font-weight: 400;
            margin-top: 2px;
        }

        /* Main Layout */
        .main-layout {
            display: flex;
            flex-direction: column;
        }

        /* Featured Section */
        .featured-section {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .featured-slides {
            position: relative;
            width: 100%;
        }

        .featured-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .featured-slide.active {
            opacity: 1;
            pointer-events: auto;
            position: relative;
        }

        .featured-link {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .featured-media-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
        }

        .featured-media {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .featured-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .featured-content {
            padding: 12px 16px;
            background: #fff;
        }

        /* Carousel arrows */
        .carousel-arrow {
            position: absolute;
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.3);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            top: 50%;
            transform: translateY(-50%);
        }

        .carousel-arrow:active {
            background: rgba(0,0,0,0.5);
        }

        .carousel-arrow-prev {
            left: 8px;
        }

        .carousel-arrow-next {
            right: 8px;
        }

        .carousel-arrow svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .featured-category {
            display: inline-block;
            background: #dc2626;
            color: #fff;
            font-size: 9px;
            font-weight: 600;
            padding: 3px 6px;
            border-radius: 2px;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .featured-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a202c;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .featured-excerpt {
            font-size: 12px;
            color: #4a5568;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .featured-date {
            font-size: 10px;
            color: #a0aec0;
            margin-top: 4px;
        }

        /* News List Section */
        .news-list-section {
            background: #fafafa;
        }

        .news-list {
            overflow-y: visible;
        }

        .news-item {
            display: block;
            padding: 14px 16px;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid #eee;
        }

        .news-item:active {
            background: #f0f0f0;
        }

        .news-content {
            width: 100%;
        }

        .news-category {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            color: #2c5282;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 2px;
        }

        .news-title {
            font-size: 14px;
            font-weight: 500;
            color: #1a202c;
            line-height: 1.35;
            margin-bottom: 3px;
        }

        .news-date {
            font-size: 11px;
            color: #a0aec0;
        }

        /* Footer */
        .widget-footer {
            background: #f8f9fa;
            padding: 14px 16px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
        }

        .footer-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #2c5282;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }

        .footer-link:active {
            color: #1a365d;
        }

        .footer-link svg {
            width: 14px;
            height: 14px;
        }

        .loading {
            padding: 20px;
            text-align: center;
            color: #718096;
            font-size: 13px;
        }

        /* Mobile optimizations */
        @media (max-width: 699px) {
            .featured-media-wrapper {
                padding-bottom: 56.25%;
            }
            
            .news-item {
                padding: 12px 14px;
            }
        }

        /* Desktop */
        @media (min-width: 700px) {
            .widget-container {
                max-width: 800px;
                border-radius: 12px;
                margin: 20px auto;
                box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            }

            .featured-content {
                padding: 14px 18px;
            }

            .featured-title {
                font-size: 17px;
            }

            .news-item {
                padding: 14px 18px;
            }

            .news-title {
                font-size: 15px;
            }
        }

        /* Large Desktop */
        @media (min-width: 1000px) {
            .widget-container {
                max-width: 1100px;
            }

            .featured-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <!-- Header -->
        <header class="widget-header">
            <a href="https://cec.org.co" target="_blank" class="widget-banner">
                <img src="images/logo.svg" alt="CEC Logo" class="widget-logo" onerror="this.style.display='none'">
                <div class="widget-title-group">
                    <div class="widget-subtitle">Noticias de la Iglesia en Colombia</div>
                </div>
            </a>
        </header>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Featured News with Video Carousel -->
            <div class="featured-section" id="featuredNews">
                <div class="loading">Cargando...</div>
            </div>

            <!-- News List -->
            <div class="news-list-section">
                <div class="news-list" id="newsList">
                    <div class="loading">Cargando noticias...</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="widget-footer">
            <a href="https://cec.org.co" target="_blank" class="footer-link">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                </svg>
                Ver más en cec.org.co
            </a>
        </footer>
    </div>

    <script>
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadNews() {
            try {
                const response = await fetch('news-data.json');
                const news = await response.json();
                renderNews(news);
            } catch (error) {
                console.error('Error loading news:', error);
                document.getElementById('featuredNews').innerHTML = `
                    <div class="featured-content">
                        <p style="color:#718096;font-size:13px;">Error al cargar. <a href="https://cec.org.co" target="_blank">Visitar CEC.org.co</a></p>
                    </div>
                `;
            }
        }

        function renderNews(news) {
            if (!news || news.length === 0) return;

            // Get first 2 items with video for carousel
            const videoItems = news.filter(item => item.video && item.video.includes('youtube.com/embed/')).slice(0, 2);
            const featuredItems = videoItems.length >= 1 ? videoItems : [news[0]];
            
            // Remaining items for text list
            const featuredUrls = featuredItems.map(f => f.url);
            const remaining = news.filter(item => !featuredUrls.includes(item.url)).slice(0, 6);

            // Build carousel slides
            let slidesHtml = '<div class="featured-slides">';
            
            featuredItems.forEach((item, index) => {
                const hasVideo = item.video && item.video.includes('youtube.com/embed/');
                const isActive = index === 0 ? ' active' : '';
                
                slidesHtml += `<div class="featured-slide${isActive}">`;
                slidesHtml += `<a href="${escapeHtml(item.url)}" target="_blank" class="featured-link">`;
                slidesHtml += `<div class="featured-media-wrapper">`;
                
                if (hasVideo) {
                    slidesHtml += `<iframe class="featured-video" src="${escapeHtml(item.video)}?autoplay=0&rel=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
                } else {
                    slidesHtml += `<img class="featured-media" src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x225/e2e8f0/a0aec0?text=CEC'">`;
                }
                
                // Add carousel arrows
                if (featuredItems.length > 1) {
                    slidesHtml += `
                        <button class="carousel-arrow carousel-arrow-prev" aria-label="Anterior">
                            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                        </button>
                        <button class="carousel-arrow carousel-arrow-next" aria-label="Siguiente">
                            <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                        </button>
                    `;
                }
                
                slidesHtml += `</div>`;
                slidesHtml += `
                    <div class="featured-content">
                        <span class="featured-category">${escapeHtml(item.category)}</span>
                        <h2 class="featured-title">${escapeHtml(item.title)}</h2>
                        <p class="featured-excerpt">${escapeHtml(item.excerpt)}</p>
                        <span class="featured-date">${escapeHtml(item.date)}</span>
                    </div>
                </a>`;
                slidesHtml += `</div>`;
            });
            
            slidesHtml += '</div>';
            
            document.getElementById('featuredNews').innerHTML = slidesHtml;

            // Start auto-rotation if multiple slides
            if (featuredItems.length > 1) {
                startCarousel(featuredItems.length);
            }

            // News list
            const newsList = document.getElementById('newsList');
            newsList.innerHTML = remaining.map(item => `
                <a href="${escapeHtml(item.url)}" target="_blank" class="news-item">
                    <div class="news-content">
                        <span class="news-category">${escapeHtml(item.category)}</span>
                        <h3 class="news-title">${escapeHtml(item.title)}</h3>
                        <span class="news-date">${escapeHtml(item.date)}</span>
                    </div>
                </a>
            `).join('');
        }

        let carouselInterval = null;
        let currentSlide = 0;

        function startCarousel(totalSlides) {
            if (carouselInterval) {
                clearInterval(carouselInterval);
            }
            
            carouselInterval = setInterval(() => {
                currentSlide = (currentSlide + 1) % totalSlides;
                showSlide(currentSlide);
            }, 10000);
        }

        function showSlide(index) {
            const slides = document.querySelectorAll('.featured-slide');
            slides.forEach((slide, i) => {
                slide.classList.toggle('active', i === index);
            });
        }

        // Handle arrow clicks
        document.addEventListener('click', (e) => {
            if (e.target.closest('.carousel-arrow-prev')) {
                e.preventDefault();
                e.stopPropagation();
                const totalSlides = document.querySelectorAll('.featured-slide').length;
                currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
                showSlide(currentSlide);
                startCarousel(totalSlides);
            }
            
            if (e.target.closest('.carousel-arrow-next')) {
                e.preventDefault();
                e.stopPropagation();
                const totalSlides = document.querySelectorAll('.featured-slide').length;
                currentSlide = (currentSlide + 1) % totalSlides;
                showSlide(currentSlide);
                startCarousel(totalSlides);
            }
        });

        loadNews();
    </script>
</body>
</html>
